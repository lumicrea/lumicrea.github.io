<!DOCTYPE html>\n<html lang="en">\n<head>\n    
  <meta charset="UTF-8">\n    
  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    
  <title>Real-Time Dashboard</title>\n    
  <style>\n        
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }\n       
    .widget { background: white; border-radius: 5px; padding: 20px; margin: 10px 0; box-shadow: 0 0 10px rgba(0,0,0,0.1); }\n        
    .header { text-align: center; margin-bottom: 20px; }\n    
  </style>\n</head>\n<body>\n    
    
    <div class="header">\n        
      <h1>Real-Time Dashboard</h1>\n    </div>\n    
    
    <div class="widget" id="weather">\n        
      <h2>Weather</h2>\n        
      <p>Loading...</p>\n    </div>\n    
    
    <div class="widget" id="crypto">\n       
      <h2>Cryptocurrency Prices</h2>\n        
      <p>Loading...</p>\n    </div>\n   
    
    <script>\n        async function fetchWeather() 
{\n            const response = await fetch('https://api.openweathermap.org/data/2.5/weather?q=London&appid=YOUR_API_KEY');\n        
              const data = await response.json();\n            
                document.getElementById('weather').innerHTML = `<h2>Weather in ${data.name}</h2><p>${data.weather[0].description}, ${Math.round(data.main.temp - 273.15)}°C</p>`;\n        }\n       
            async function fetchCryptoPrices() {\n            
              const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,litecoin&vs_currencies=usd');\n            
                const data = await response.json();\n            
                  document.getElementById('crypto').innerHTML = `<h2>Prices</h2><p>Bitcoin: $${data.bitcoin.usd}, Ethereum: $${data.ethereum.usd}, Litecoin: $${data.litecoin.usd}</p>`;\n        }\n        
              function refreshWidgets() {\n            fetchWeather();\n            fetchCryptoPrices();\n        }\n        setInterval(refreshWidgets, 3000000); // Refresh every 50 minutes\n        window.onload = refreshWidgets;\n    
    </script>\n</body>\n</html>
