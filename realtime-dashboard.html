<!DOCTYPE html> 
<html lang="en">
  <head> 
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Real-Time Dashboard</title>   
  <style>     
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }      
    .widget { background: white; border-radius: 5px; padding: 20px; margin: 10px 0; box-shadow: 0 0 10px rgba(0,0,0,0.1); }     
    .header { text-align: center; margin-bottom: 20px; } 
  </style>
    </head>
  <body>  
    
    <div class="header">      
      <h1>Real-Time Dashboard</h1>   
    </div>  
    
    <div class="widget" id="weather">       
      <h2>Weather</h2>        
      <p>Loading...</p>    
    </div>   
    
    <div class="widget" id="crypto">       
      <h2>Cryptocurrency Prices</h2>        
      <p>Loading...</p>    </div>   
    
    <script>        
     
      async function fetchCryptoPrices() {            
              const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,litecoin&vs_currencies=usd');           
                const data = await response.json();            
                  document.getElementById('crypto').innerHTML = `<h2>Prices</h2><p>Bitcoin: $${data.bitcoin.usd}, Ethereum: $${data.ethereum.usd}, Litecoin: $${data.litecoin.usd}</p>`;\n        }        
              function refreshWidgets() {
                fetchWeather();
                fetchCryptoPrices();
              }
      setInterval(refreshWidgets, 3000000); // Refresh every 50 minutes\n        window.onload = refreshWidgets;\n    
    </script>
  </body>
</html>
